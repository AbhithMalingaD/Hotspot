name: hotspot
description: Co-working space marketplace app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # QR Code 
  qr_flutter: ^4.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Network Images
  cached_network_image: ^3.3.1

  # Animations
  flutter_animate: ^4.5.0

  # URL Launcher (directions)
  url_launcher: ^6.2.5

  # Image Picker (avatar upload)
  image_picker: ^1.0.7

  # Location Services
  geolocator: ^13.0.1

  # Font Awesome Icons
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
